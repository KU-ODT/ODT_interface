# Phase 2 / Step 7: Launch Stakeholder GUI
# From: DTAMCore.SessionConnectionManager → To: StakeholderGUI
# Response (7-R): StakeholderGUI → DTAMCore.SessionConnectionManager
post:
  tags: [Phase 2 Initialization]
  summary: "P2.7 Launch Stakeholder GUI"
  description: |
    이해관계자 모니터링 화면을 기동합니다.
    - **From**: DTAMCore.SessionConnectionManager
    - **To**: StakeholderGUI
    - **Type**: action
    - **Protocol**: HTTP POST / WebSocket
    - **Response (7-R)**: Endpoint IP 반환
  operationId: launchStakeholderGUI
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            sessionId:
              type: string
              format: uuid
  responses:
    '200':
      description: Stakeholder GUI 기동 완료
      content:
        application/json:
          schema:
            type: object
            properties:
              moduleId:
                type: string
                example: "stakeholder-gui-001"
              endpointIP:
                type: string
                example: "192.168.1.102:8083"
              status:
                type: string
                enum: [ready]
                example: "ready"
